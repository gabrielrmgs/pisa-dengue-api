# ─────────────────────────────────────────────────────────────────────────────
# PISA Dengue — Configuração dos REST Clients para APIs públicas
# ─────────────────────────────────────────────────────────────────────────────

# ── InfoDengue (Fiocruz / EMAp) ───────────────────────────────────────────────
quarkus.rest-client.infodengue.url=https://info.dengue.mat.br
quarkus.rest-client.infodengue.connect-timeout=5000
quarkus.rest-client.infodengue.read-timeout=15000
# Scope singleton para reaproveitar conexões HTTP
quarkus.rest-client.infodengue.scope=jakarta.inject.Singleton

# ── IBGE — Malha Geográfica (fallback apenas) ────────────────────────────────
# BairroGeoJsonRepository usa primeiro resources/geojson/bairros_{geocodigo}.json.
# Esta config só é acionada para municípios sem arquivo local.
# Bom Jesus (2201903) usa o GeoJSON local com bairros — nunca chega aqui.
quarkus.rest-client.ibge-malha.url=https://servicodados.ibge.gov.br
quarkus.rest-client.ibge-malha.connect-timeout=5000
quarkus.rest-client.ibge-malha.read-timeout=30000
quarkus.rest-client.ibge-malha.scope=jakarta.inject.Singleton

# ── IBGE — Dados / Localidades ────────────────────────────────────────────────
quarkus.rest-client.ibge-dados.url=https://servicodados.ibge.gov.br
quarkus.rest-client.ibge-dados.connect-timeout=5000
quarkus.rest-client.ibge-dados.read-timeout=10000
quarkus.rest-client.ibge-dados.scope=jakarta.inject.Singleton

# ── IBGE — SIDRA (Censo 2022) ─────────────────────────────────────────────────
quarkus.rest-client.ibge-sidra.url=https://apisidra.ibge.gov.br
quarkus.rest-client.ibge-sidra.connect-timeout=5000
quarkus.rest-client.ibge-sidra.read-timeout=20000
quarkus.rest-client.ibge-sidra.scope=jakarta.inject.Singleton

# ── Open-Meteo — Previsão e dados recentes ────────────────────────────────────
quarkus.rest-client.open-meteo.url=https://api.open-meteo.com
quarkus.rest-client.open-meteo.connect-timeout=5000
quarkus.rest-client.open-meteo.read-timeout=10000
quarkus.rest-client.open-meteo.scope=jakarta.inject.Singleton

# ── Open-Meteo — Archive (dados históricos) ───────────────────────────────────
quarkus.rest-client.open-meteo-archive.url=https://archive-api.open-meteo.com
quarkus.rest-client.open-meteo-archive.connect-timeout=5000
# Histórico anual pode demorar mais
quarkus.rest-client.open-meteo-archive.read-timeout=30000
quarkus.rest-client.open-meteo-archive.scope=jakarta.inject.Singleton

# ─────────────────────────────────────────────────────────────────────────────
# Cache (Caffeine) — evita sobrecarga nas APIs públicas
# ─────────────────────────────────────────────────────────────────────────────

# InfoDengue: dados mudam semanalmente — cache de 1h em produção
quarkus.cache.caffeine.infodengue-ano.expire-after-write=1H
quarkus.cache.caffeine.infodengue-ano.maximum-size=50

quarkus.cache.caffeine.infodengue-historico.expire-after-write=6H
quarkus.cache.caffeine.infodengue-historico.maximum-size=150

# IBGE: dados do Censo 2022 são estáticos — cache de 24h
quarkus.cache.caffeine.ibge-malha.expire-after-write=24H
quarkus.cache.caffeine.ibge-malha.maximum-size=50

quarkus.cache.caffeine.ibge-municipio.expire-after-write=24H
quarkus.cache.caffeine.ibge-municipio.maximum-size=100

quarkus.cache.caffeine.ibge-populacao.expire-after-write=24H
quarkus.cache.caffeine.ibge-populacao.maximum-size=100

quarkus.cache.caffeine.ibge-sexo.expire-after-write=24H
quarkus.cache.caffeine.ibge-sexo.maximum-size=100

quarkus.cache.caffeine.ibge-faixa-etaria.expire-after-write=24H
quarkus.cache.caffeine.ibge-faixa-etaria.maximum-size=100

# Open-Meteo: atualiza a cada 6h — cache de 3h
quarkus.cache.caffeine.clima-recente.expire-after-write=3H
quarkus.cache.caffeine.clima-recente.maximum-size=100

quarkus.cache.caffeine.clima-historico.expire-after-write=24H
quarkus.cache.caffeine.clima-historico.maximum-size=150

# ─────────────────────────────────────────────────────────────────────────────
# Logging de chamadas HTTP externas (desativar em produção)
# ─────────────────────────────────────────────────────────────────────────────
quarkus.log.category."org.apache.http".level=DEBUG
quarkus.log.category."br.uespi.pisa.integracoes".level=DEBUG

# ─────────────────────────────────────────────────────────────────────────────
# Dev mode: desabilita SSL verification para testes locais com proxies
# ─────────────────────────────────────────────────────────────────────────────
%dev.quarkus.tls.trust-all=true
